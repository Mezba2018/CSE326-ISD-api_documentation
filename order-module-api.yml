components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.ebay.com/oauth2/authorize
          tokenUrl: https://api.ebay.com/identity/v1/oauth2/token
          refreshUrl: https://api.ebay.com/identity/v1/oauth2/token
          scopes:
            https://api.ebay.com/oauth/api_scope: General access
            https://api.ebay.com/oauth/api_scope/buy.browse: Browse items
            https://api.ebay.com/oauth/api_scope/buy.offer: Make offers
            https://api.ebay.com/oauth/api_scope/buy.order: Place orders
            https://api.ebay.com/oauth/api_scope/sell.inventory: Manage inventory
            https://api.ebay.com/oauth/api_scope/sell.fulfillment: Manage orders
            https://api.ebay.com/oauth/api_scope/sell.finances: Financial data
            https://api.ebay.com/oauth/api_scope/sell.marketing: Promotions
  parameters:
    ItemIdPath:
      name: itemId
      in: path
      required: true
      schema:
        type: string
      example: v1|110512188501|0
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    SkuPath:
      name: sku
      in: path
      required: true
      schema:
        type: string
    CheckoutSessionIdPath:
      name: checkoutSessionId
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Access forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              errorId:
                type: integer
              domain:
                type: string
              category:
                type: string
                enum:
                - APPLICATION
                - BUSINESS
                - REQUEST
              message:
                type: string
              longMessage:
                type: string
              parameters:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    value:
                      type: string
    Amount:
      type: object
      properties:
        value:
          type: string
          example: '29.99'
        currency:
          type: string
          example: USD
    Image:
      type: object
      properties:
        imageUrl:
          type: string
          format: uri
        height:
          type: integer
        width:
          type: integer
    Seller:
      type: object
      properties:
        username:
          type: string
        userId:
          type: string
        feedbackPercentage:
          type: string
        feedbackScore:
          type: integer
    Buyer:
      type: object
      properties:
        username:
          type: string
        userId:
          type: string
    PaginationInfo:
      type: object
      properties:
        href:
          type: string
        next:
          type: string
        prev:
          type: string
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
    ItemSummary:
      type: object
      properties:
        itemId:
          type: string
        title:
          type: string
        price:
          $ref: '#/components/schemas/Amount'
        image:
          $ref: '#/components/schemas/Image'
        condition:
          type: string
        seller:
          $ref: '#/components/schemas/Seller'
        itemLocation:
          type: string
        buyingOptions:
          type: array
          items:
            type: string
            enum:
            - FIXED_PRICE
            - AUCTION
            - BEST_OFFER
        categories:
          type: array
          items:
            type: object
            properties:
              categoryId:
                type: string
              categoryName:
                type: string
    SearchPagedCollection:
      allOf:
      - $ref: '#/components/schemas/PaginationInfo'
      - type: object
        properties:
          itemSummaries:
            type: array
            items:
              $ref: '#/components/schemas/ItemSummary'
    Item:
      type: object
      properties:
        itemId:
          type: string
        title:
          type: string
        shortDescription:
          type: string
        description:
          type: string
        price:
          $ref: '#/components/schemas/Amount'
        condition:
          type: string
        conditionId:
          type: string
        seller:
          $ref: '#/components/schemas/Seller'
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        buyingOptions:
          type: array
          items:
            type: string
            enum:
            - FIXED_PRICE
            - AUCTION
            - BEST_OFFER
        quantityAvailable:
          type: integer
        itemLocation:
          type: string
        shippingOptions:
          type: array
          items:
            type: object
            properties:
              shippingServiceCode:
                type: string
              shippingCost:
                $ref: '#/components/schemas/Amount'
              minEstimatedDeliveryDate:
                type: string
                format: date-time
              maxEstimatedDeliveryDate:
                type: string
                format: date-time
        categories:
          type: array
          items:
            type: object
            properties:
              categoryId:
                type: string
              categoryName:
                type: string
    BuyNowRequest:
      type: object
      required:
      - itemId
      - quantity
      - paymentMethod
      properties:
        itemId:
          type: string
        quantity:
          type: integer
          minimum: 1
          default: 1
        shippingAddressId:
          type: string
        paymentMethod:
          type: string
          enum:
          - CREDIT_CARD
          - PAYPAL
          - APPLE_PAY
          - GOOGLE_PAY
        paymentAccountId:
          type: string
    BuyNowResponse:
      type: object
      properties:
        orderId:
          type: string
        orderStatus:
          type: string
          enum:
          - CREATED
          - PAYMENT_PENDING
          - PAYMENT_COMPLETED
          - CONFIRMED
        itemId:
          type: string
        quantity:
          type: integer
        totalPrice:
          $ref: '#/components/schemas/Amount'
        paymentStatus:
          type: string
          enum:
          - SUCCESS
          - PENDING
          - FAILED
        paymentId:
          type: string
        createdAt:
          type: string
          format: date-time
        buyer:
          $ref: '#/components/schemas/Buyer'
        seller:
          $ref: '#/components/schemas/Seller'
    AvailabilityResponse:
      type: object
      properties:
        itemId:
          type: string
        available:
          type: boolean
        quantityAvailable:
          type: integer
    AuctionItem:
      type: object
      properties:
        itemId:
          type: string
        title:
          type: string
        description:
          type: string
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        startingPrice:
          $ref: '#/components/schemas/Amount'
        currentBid:
          $ref: '#/components/schemas/Amount'
        bidCount:
          type: integer
        highBidder:
          $ref: '#/components/schemas/Buyer'
        seller:
          $ref: '#/components/schemas/Seller'
        auctionStartTime:
          type: string
          format: date-time
        auctionEndTime:
          type: string
          format: date-time
        auctionStatus:
          type: string
          enum:
          - ACTIVE
          - ENDED
          - CANCELLED
        minimumBidIncrement:
          $ref: '#/components/schemas/Amount'
    PlaceBidRequest:
      type: object
      required:
      - bidAmount
      properties:
        bidAmount:
          $ref: '#/components/schemas/Amount'
        maxAutoBidAmount:
          $ref: '#/components/schemas/Amount'
    BidResponse:
      type: object
      properties:
        bidId:
          type: string
        itemId:
          type: string
        bidAmount:
          $ref: '#/components/schemas/Amount'
        bidStatus:
          type: string
          enum:
          - WINNING
          - OUTBID
          - CONFIRMED
        currentHighBid:
          $ref: '#/components/schemas/Amount'
        bidCount:
          type: integer
        bidTime:
          type: string
          format: date-time
    BidList:
      allOf:
      - $ref: '#/components/schemas/PaginationInfo'
      - type: object
        properties:
          bids:
            type: array
            items:
              $ref: '#/components/schemas/BidResponse'
    AuctionEndResponse:
      type: object
      properties:
        itemId:
          type: string
        auctionStatus:
          type: string
          enum:
          - ENDED
        winner:
          $ref: '#/components/schemas/AuctionWinner'
        totalBids:
          type: integer
        finalPrice:
          $ref: '#/components/schemas/Amount'
        secondChanceEligibleBidders:
          type: array
          items:
            $ref: '#/components/schemas/Buyer'
    AuctionWinner:
      type: object
      properties:
        userId:
          type: string
        username:
          type: string
        winningBid:
          $ref: '#/components/schemas/Amount'
        wonAt:
          type: string
          format: date-time
    SecondChanceOfferRequest:
      type: object
      required:
      - recipientUserId
      - offerPrice
      - duration
      properties:
        recipientUserId:
          type: string
        offerPrice:
          $ref: '#/components/schemas/Amount'
        duration:
          type: string
          enum:
          - DAYS_1
          - DAYS_3
          - DAYS_5
          - DAYS_7
    SecondChanceOfferResponse:
      type: object
      properties:
        offerId:
          type: string
        itemId:
          type: string
        recipientUserId:
          type: string
        offerPrice:
          $ref: '#/components/schemas/Amount'
        expirationDate:
          type: string
          format: date-time
        status:
          type: string
          enum:
          - SENT
          - ACCEPTED
          - DECLINED
          - EXPIRED
    MakeOfferRequest:
      type: object
      required:
      - offerPrice
      properties:
        offerPrice:
          $ref: '#/components/schemas/Amount'
        message:
          type: string
        quantity:
          type: integer
          minimum: 1
          default: 1
    OfferDecisionRequest:
      type: object
      required:
      - action
      properties:
        action:
          type: string
          enum:
          - ACCEPT
          - REJECT
          - COUNTER
        counterOfferPrice:
          $ref: '#/components/schemas/Amount'
        message:
          type: string
    OfferResponse:
      type: object
      properties:
        offerId:
          type: string
        itemId:
          type: string
        offerPrice:
          $ref: '#/components/schemas/Amount'
        status:
          type: string
          enum:
          - PENDING
          - ACCEPTED
          - REJECTED
          - COUNTERED
          - EXPIRED
        buyer:
          $ref: '#/components/schemas/Buyer'
        seller:
          $ref: '#/components/schemas/Seller'
        negotiationRound:
          type: integer
        counterOfferPrice:
          $ref: '#/components/schemas/Amount'
        addedToCart:
          type: boolean
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
    OfferList:
      allOf:
      - $ref: '#/components/schemas/PaginationInfo'
      - type: object
        properties:
          offers:
            type: array
            items:
              $ref: '#/components/schemas/OfferResponse'
    PaymentRequest:
      type: object
      required:
      - orderId
      - paymentMethod
      - amount
      properties:
        orderId:
          type: string
        paymentMethod:
          type: string
          enum:
          - CREDIT_CARD
          - PAYPAL
          - APPLE_PAY
          - GOOGLE_PAY
          - BANK_TRANSFER
        paymentAccountId:
          type: string
        amount:
          $ref: '#/components/schemas/Amount'
    PaymentResponse:
      type: object
      properties:
        paymentId:
          type: string
        orderId:
          type: string
        paymentMethod:
          type: string
        amount:
          $ref: '#/components/schemas/Amount'
        status:
          type: string
          enum:
          - SUCCESS
          - PENDING
          - FAILED
          - REFUNDED
        gatewayTransactionId:
          type: string
        processedAt:
          type: string
          format: date-time
        payer:
          type: string
        payee:
          type: string
    RefundRequest:
      type: object
      required:
      - paymentId
      - refundAmount
      properties:
        paymentId:
          type: string
        orderId:
          type: string
        refundAmount:
          $ref: '#/components/schemas/Amount'
        reason:
          type: string
          enum:
          - ITEM_NOT_RECEIVED
          - ITEM_NOT_AS_DESCRIBED
          - BUYER_CANCEL
          - OTHER
    RefundResponse:
      type: object
      properties:
        refundId:
          type: string
        paymentId:
          type: string
        refundAmount:
          $ref: '#/components/schemas/Amount'
        status:
          type: string
          enum:
          - PENDING
          - SUCCESS
          - FAILED
        gatewayRefundId:
          type: string
        processedAt:
          type: string
          format: date-time
        refundTo:
          type: string
    CreateReturnRequest:
      type: object
      required:
      - orderId
      - itemId
      - returnReason
      properties:
        orderId:
          type: string
        itemId:
          type: string
        returnReason:
          type: string
          enum:
          - ITEM_NOT_AS_DESCRIBED
          - ITEM_DAMAGED
          - WRONG_ITEM
          - ITEM_NOT_RECEIVED
          - CHANGED_MIND
          - OTHER
        comment:
          type: string
    ReturnRequest:
      type: object
      properties:
        returnId:
          type: string
        orderId:
