openapi: 3.0.3
info:
  title: eBay Marketplace API
  version: 1.0.0
servers:
- url: https://ISD-Ka-Ye-Dukh-Kahe-Khatam-Nahi-Hota.com
- url: https://ebay.com
tags:
- name: Browse & Search
- name: Checkout & Orders (Buyer)
- name: Auctions
- name: Offers & Negotiation
- name: Payments & Refunds
- name: Returns & Post-Order
- name: Inventory Management
- name: Order Fulfillment (Seller)
- name: Promotions & Marketing
- name: Shipping & Logistics
- name: Classified Ads
- name: Messaging
security:
- OAuth2:
  - https://api.ebay.com/oauth/api_scope
paths:
  /buy/v1/browse/item_summary/search:
    get:
      tags:
      - Browse & Search
      summary: Search Items
      operationId: searchItems
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
        example: iPhone 15 Pro
      - name: category_ids
        in: query
        schema:
          type: string
      - name: filter
        in: query
        schema:
          type: string
      - name: sort
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchPagedCollection'
          description: HTTP 200 response
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /buy/v1/browse/item/{itemId}:
    get:
      tags:
      - Browse & Search
      summary: Get Item Details
      operationId: getItemDetails
      parameters:
      - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
          description: HTTP 200 response
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /buy/v1/order/checkout_session/initiate:
    post:
      tags:
      - Checkout & Orders (Buyer)
      summary: Initiate Checkout Session
      operationId: initiateCheckoutSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuyNowRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyNowResponse'
          description: HTTP 201 response
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: HTTP 409 response
        '402':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: HTTP 402 response
        '500':
          $ref: '#/components/responses/InternalServerError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /buy/v1/order/checkout_session/{checkoutSessionId}:
    get:
      tags:
      - Checkout & Orders (Buyer)
      summary: Get Checkout Session
      operationId: getCheckoutSession
      parameters:
      - $ref: '#/components/parameters/CheckoutSessionIdPath'
      responses:
        '200':
          description: HTTP 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /buy/v1/order/checkout_session/{checkoutSessionId}/place_order:
    post:
      tags:
      - Checkout & Orders (Buyer)
      summary: Place Order from Checkout Session
      operationId: placeOrderFromCheckoutSession
      parameters:
      - $ref: '#/components/parameters/CheckoutSessionIdPath'
      responses:
        '201':
          description: HTTP 201 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyNowResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /buy/v1/offer/bidding/{itemId}:
    get:
      tags:
      - Auctions
      summary: Get Bidding Item
      operationId: getBiddingItem
      parameters:
      - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionItem'
          description: HTTP 200 response
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /buy/v1/offer/bidding/{itemId}/place_proxy_bid:
    post:
      tags:
      - Auctions
      summary: Place Proxy Bid
      operationId: placeProxyBid
      parameters:
      - $ref: '#/components/parameters/ItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceBidRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidResponse'
          description: HTTP 200 response
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: HTTP 400 response
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /buy/v1/offer/bidding/{itemId}/bids:
    get:
      tags:
      - Auctions
      summary: Get Bid History
      operationId: getBidHistory
      parameters:
      - $ref: '#/components/parameters/ItemIdPath'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidList'
          description: HTTP 200 response
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /sell/v1/inventory/auction/{itemId}/end:
    post:
      tags:
      - Auctions
      summary: End Auction Listing
      operationId: endAuctionListing
      parameters:
      - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuctionEndResponse'
          description: HTTP 200 response
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: HTTP 400 response
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /sell/v1/negotiation/offer/{offerId}/send_second_chance_offer:
    post:
      tags:
      - Auctions
      summary: Send Second Chance Offer
      operationId: sendSecondChanceOffer
      parameters:
      - $ref: '#/components/parameters/ItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecondChanceOfferRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecondChanceOfferResponse'
          description: HTTP 201 response
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /buy/v1/offer/offer/{itemId}/make_offer:
    post:
      tags:
      - Offers & Negotiation
      summary: Make Offer
      operationId: makeOffer
      parameters:
      - $ref: '#/components/parameters/ItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeOfferRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferResponse'
          description: HTTP 201 response
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /sell/v1/negotiation/offer/{offerId}/respond:
    post:
      tags:
      - Offers & Negotiation
      summary: Respond to Offer
      operationId: respondToOffer
      parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferDecisionRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferResponse'
          description: HTTP 200 response
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /buy/v1/offer/offer/{offerId}:
    get:
      tags:
      - Offers & Negotiation
      summary: Get Offer
      operationId: getOffer
      parameters:
      - name: offerId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: HTTP 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /commerce/v1/payment/payment:
    post:
      tags:
      - Payments & Refunds
      summary: Create Payment
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
          description: HTTP 200 response
        '402':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: HTTP 402 response
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /commerce/v1/payment/payment/{paymentId}:
    get:
      tags:
      - Payments & Refunds
      summary: Get Payment
      operationId: getPayment
      parameters:
      - name: paymentId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
          description: HTTP 200 response
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /commerce/v1/refund/refund:
    post:
      tags:
      - Payments & Refunds
      summary: Create Refund
      operationId: createRefund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
          description: HTTP 200 response
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: HTTP 404 response
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /post-order/v1/return:
    post:
      tags:
      - Returns & Post-Order
      summary: Submit Return Request
      operationId: submitReturnRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReturnRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReturnRequest'
          description: HTTP 201 response
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /post-order/v1/return/search:
    get:
      tags:
      - Returns & Post-Order
      summary: Search Return Requests
      operationId: searchReturnRequests
      parameters:
      - name: buyer_login_name
        in: query
        schema:
          type: string
      - name: seller_login_name
        in: query
        schema:
          type: string
      - name: return_status
        in: query
        schema:
          type: string
          enum:
          - PENDING
          - APPROVED
          - DECLINED
      - name: order_id
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReturnRequestSearchResult'
          description: HTTP 200 response
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /post-order/v1/return/{returnId}:
    get:
      tags:
      - Returns & Post-Order
      summary: Get Return Request Details
      operationId: getReturnDetail
      parameters:
      - name: returnId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReturnRequest'
          description: HTTP 200 response
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /post-order/v1/return/{returnId}/approve:
    post:
      tags:
      - Returns & Post-Order
      summary: Approve Return Request (Seller)
      operationId: approveReturnRequest
      parameters:
      - name: returnId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReturnDecision'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReturnRequest'
          description: HTTP 200 response
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /post-order/v1/return/{returnId}/decline:
    post:
      tags:
      - Returns & Post-Order
      summary: Decline Return Request (Seller)
      operationId: declineReturnRequest
      parameters:
      - name: returnId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReturnDecision'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReturnRequest'
          description: HTTP 200 response
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /sell/v1/inventory/inventory_item:
    post:
      tags:
      - Inventory Management
      summary: Create Inventory Item
      operationId: createInventoryItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddItemResponse'
          description: HTTP 201 response
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /sell/v1/inventory/inventory_item/{sku}:
    get:
      tags:
      - Inventory Management
      summary: Get Inventory Item
      operationId: getInventoryItem
      parameters:
      - $ref: '#/components/parameters/SkuPath'
      responses:
        '200':
          description: HTTP 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
      - Inventory Management
      summary: Update Inventory Item
      operationId: updateInventoryItem
      parameters:
      - $ref: '#/components/parameters/SkuPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: HTTP 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
      - Inventory Management
      summary: Delete Inventory Item
      operationId: deleteInventoryItem
      parameters:
      - $ref: '#/components/parameters/SkuPath'
      responses:
        '200':
          description: HTTP 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /sell/v1/fulfillment/order:
    get:
      tags:
      - Order Fulfillment (Seller)
      summary: Get Orders
      operationId: getOrders
      parameters:
      - name: filter
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SellerOrderList'
          description: HTTP 200 response
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /sell/v1/fulfillment/order/{orderId}:
    get:
      tags:
      - Order Fulfillment (Seller)
      summary: Get Order
      operationId: getOrder
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SellerOrder'
          description: HTTP 200 response
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /sell/v1/fulfillment/order/{orderId}/shipping_fulfillment:
    post:
      tags:
      - Order Fulfillment (Seller)
      summary: Create Shipping Fulfillment
      operationId: createShippingFulfillment
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentUpdateRequest'
      responses:
        '200':
          description: HTTP 200 response
          content:
            application/json:
              schema:
